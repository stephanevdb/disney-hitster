services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    environment:
      TLS_CN: ${TLS_CN:-dh.svdb.cc}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SONGS_PATH: /data/songs.json
    volumes:
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs
      - ./data:/data
    restart: unless-stopped
